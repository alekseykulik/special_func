{% extends "base.html" %}

{% block title %}Редактировать подраздел{% endblock %}

{% block content %}
<div class="card fancy-card mx-auto" style="max-width: 900px;">
    <div class="card-body">
        <h1 class="mb-4">Редактировать подраздел</h1>

        <form method="POST" action="{{ url_for('edit_subsection', subsection_id=subsection.id) }}">
            
            <label class="form-label">Название подраздела</label>
            <input class="form-control mb-3" name="title" value="{{ subsection.title }}" required>

            <label class="form-label">Описание подраздела</label>
            <textarea class="form-control mb-3" name="description" rows="5">{{ subsection.description or '' }}</textarea>

            <label class="form-label">К какому разделу относится</label>
            <select class="form-control mb-4" name="section_id" required>
                {% for sec in sections %}
                <option value="{{ sec.id }}" {% if sec.id == subsection.section_id %}selected{% endif %}>
                    {{ sec.title }}
                </option>
                {% endfor %}
            </select>

            <div class="d-flex gap-2">
                <button class="btn btn-main" type="submit">Сохранить</button>
                <a class="btn btn-secondary" href="{{ url_for('admin') }}">Отмена</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
