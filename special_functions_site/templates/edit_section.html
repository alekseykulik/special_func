{% extends "base.html" %}

{% block title %}Редактировать раздел{% endblock %}

{% block content %}
<div class="card fancy-card mx-auto" style="max-width: 900px;">
    <div class="card-body">
        <h1 class="mb-4">Редактировать раздел</h1>

        <form method="POST" action="{{ url_for('edit_section', section_id=section.id) }}">
            
            <label class="form-label">Название раздела</label>
            <input class="form-control mb-3" name="title" value="{{ section.title }}" required>

            <label class="form-label">Описание раздела</label>
            <textarea class="form-control mb-3" name="description" rows="5">{{ section.description or '' }}</textarea>

            <div class="d-flex gap-2">
                <button class="btn btn-main" type="submit">Сохранить</button>
                <a class="btn btn-secondary" href="{{ url_for('admin') }}">Отмена</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
