{% extends "base.html" %}

{% block title %}О проекте - Специальные функции{% endblock %}

{% block content %}
<!-- Добавлен класс about-page для изоляции стилей -->
<div class="container py-4 about-page">
    
    <div class="text-center mb-5">
        <h1 class="fw-bold d-inline-flex align-items-center gap-3">
            <i class="bi bi-info-circle text-primary"></i> 
            О проекте
        </h1>
        <p class="lead text-muted mt-2">
            Создание цифровой библиотеки специальных функций
        </p>
    </div>

    <!-- БЛОК 1: Фото слева, текст справа -->
    <div class="row align-items-center mb-5 pb-3">
        <div class="col-md-5 col-lg-4 mb-4 mb-md-0">
            <figure class="figure text-center m-0">
                <!-- Заглушка. Чтобы вставить своё фото, замените src на: {{ url_for('static', filename='img/photo1.jpg') }} -->
                <img src="https://placehold.co/600x450/e9ecef/495057?text=Фото+1" class="figure-img img-fluid" alt="Фото 1">
                <figcaption class="figure-caption">
                    1
                </figcaption>
            </figure>
        </div>
        <div class="col-md-7 col-lg-8">
            <h3 class="h4 fw-bold mb-3">1</h3>
            <p>
                1
            </p>
        </div>
    </div>

    <hr class="opacity-25 my-5">

    <!-- БЛОК 2: Текст слева, фото справа (flex-md-row-reverse) -->
    <div class="row align-items-center flex-md-row-reverse mb-5 pb-3">
        <div class="col-md-5 col-lg-4 mb-4 mb-md-0">
            <figure class="figure text-center m-0">
                <img src="https://placehold.co/600x450/e9ecef/495057?text=Фото+2" class="figure-img img-fluid" alt="Фото 2">
                <figcaption class="figure-caption">
                    2
                </figcaption>
            </figure>
        </div>
        <div class="col-md-7 col-lg-8">
            <h3 class="h4 fw-bold mb-3">2</h3>
            <p>
                2
            </p>
        </div>
    </div>

    <hr class="opacity-25 my-5">

    <!-- БЛОК 3: Фото слева, текст справа -->
    <div class="row align-items-center mb-5 pb-3">
        <div class="col-md-5 col-lg-4 mb-4 mb-md-0">
            <figure class="figure text-center m-0">
                <img src="https://placehold.co/600x450/e9ecef/495057?text=Фото+3" class="figure-img img-fluid" alt="Фото 3">
                <figcaption class="figure-caption">
                    3
                </figcaption>
            </figure>
        </div>
        <div class="col-md-7 col-lg-8">
            <h3 class="h4 fw-bold mb-3">3</h3>
            <p>
                3
            </p>
        </div>
    </div>

    <hr class="opacity-25 my-5">

    <!-- БЛОК 4: Текст слева, фото справа (flex-md-row-reverse) -->
    <div class="row align-items-center flex-md-row-reverse mb-5">
        <div class="col-md-5 col-lg-4 mb-4 mb-md-0">
            <figure class="figure text-center m-0">
                <img src="https://placehold.co/600x450/e9ecef/495057?text=Фото+4" class="figure-img img-fluid" alt="Фото 4">
                <figcaption class="figure-caption">
                    4
                </figcaption>
            </figure>
        </div>
        <div class="col-md-7 col-lg-8">
            <h3 class="h4 fw-bold mb-3">4</h3>
            <p>
                4
            </p>
        </div>
    </div>

</div>
{% endblock %}
