<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}Специальные функции{% endblock %}</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

    <script>
        window.MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$']]
            }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
</head>
<body>

<nav class="navbar navbar-expand-lg topbar">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/">Спецфункции</a>

        <div class="d-flex gap-2">
            <a class="btn btn-sm btn-outline-light" href="/">Главная</a>
            {% if current_user.is_authenticated %}
                <a class="btn btn-sm btn-light" href="/admin">Админка</a>
                <a class="btn btn-sm btn-outline-warning" href="/logout">Выход</a>
            {% else %}
                <a class="btn btn-sm btn-light" href="/login">Вход</a>
            {% endif %}
        </div>
    </div>
</nav>

<div class="container py-4">
    {% block content %}{% endblock %}
</div>

</body>
</html>
