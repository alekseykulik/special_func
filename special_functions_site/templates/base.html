<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}Специальные функции{% endblock %}</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Подключаем красивые шрифты от Google -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Подключаем иконки Bootstrap -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Наш кастомный стиль -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

    <script>
        window.MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                /* Добавили распознавание \[ и \] */
                displayMath: [['$$', '$$'], ['\\[', '\\]']]
            }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
</head>
<body>

<!-- Навигация -->
<nav class="navbar navbar-expand-lg topbar sticky-top">
    <div class="container">
        <a class="navbar-brand fw-bold d-flex align-items-center gap-2" href="/">
            <i class="bi bi-hexagon-half brand-icon"></i>
            Спецфункции
        </a>

        <div class="d-flex gap-3 align-items-center">
            <a class="nav-link-custom" href="/">
                <i class="bi bi-house-door"></i> Главная
            </a>
            {% if current_user.is_authenticated %}
                <a class="nav-link-custom" href="/admin">
                    <i class="bi bi-gear"></i> Админка
                </a>
                <a class="btn btn-sm btn-logout" href="/logout">
                    <i class="bi bi-box-arrow-right"></i> Выход
                </a>
            {% else %}
                <a class="btn btn-sm btn-login" href="/login">
                    <i class="bi bi-person"></i> Вход
                </a>
            {% endif %}
        </div>
    </div>
</nav>

<!-- Основной контент -->
<main class="container py-5 content-wrapper">
    {% block content %}{% endblock %}
</main>

<!-- Подвал -->
<footer class="footer mt-auto">
    <div class="container d-flex flex-column flex-md-row justify-content-between align-items-center py-3">
        
        <small class="text-muted mb-2 mb-md-0">
            © 2026 База знаний специальных функций. Все права защищены.
        </small>
        
        <div class="d-flex align-items-center">
            <a href="{{ url_for('about') }}" class="nav-link-custom">
                <i class="bi bi-info-circle me-1"></i> О проекте
            </a>
        </div>
        
    </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
