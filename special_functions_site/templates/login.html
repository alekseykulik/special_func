{% extends "base.html" %}

{% block title %}Вход{% endblock %}

{% block content %}
<div class="card fancy-card mx-auto" style="max-width: 500px;">
    <div class="card-body">
        <h1 class="mb-4">Вход администратора</h1>

        <form method="post">
            <input class="form-control mb-3" type="text" name="username" placeholder="Логин" required>
            <input class="form-control mb-3" type="password" name="password" placeholder="Пароль" required>
            <button class="btn btn-main w-100" type="submit">Войти</button>
        </form>
    </div>
</div>
{% endblock %}
